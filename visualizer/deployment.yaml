apiVersion: apps/v1
kind: Deployment
metadata:
  name: treesearch-visualizer
  namespace: apps
  labels:
    app: treesearch-visualizer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: treesearch-visualizer
  template:
    metadata:
      labels:
        app: treesearch-visualizer
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: visualizer
          image: gimages.azurecr.io/treesearch-visualizer:1.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: treesearch-visualizer
  namespace: apps
  labels:
    app: treesearch-visualizer
spec:
  selector:
    app: treesearch-visualizer
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: treesearch-visualizer
  namespace: apps
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - treesearch.gerardosalazar.com
      secretName: treesearch-gerardosalazar-com-tls
  rules:
    - host: treesearch.gerardosalazar.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: treesearch-visualizer
                port:
                  number: 80
